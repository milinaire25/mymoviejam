<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Jack Ryan: Ghost War review artwork</title>
  <desc id="desc">MyMovieJam review artwork for Jack Ryan: Ghost War with a soft-no verdict and 5.5 out of 10 rating.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="55%" stop-color="#1a1b2f"/>
      <stop offset="100%" stop-color="#3d1016"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#12a594"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="930" cy="158" r="140" fill="#ffffff" opacity="0.05"/>
  <circle cx="930" cy="158" r="78" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="930" y1="36" x2="930" y2="280" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>
  <line x1="808" y1="158" x2="1052" y2="158" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>
  <rect x="64" y="58" width="170" height="36" rx="18" fill="url(#accent)"/>
  <text x="149" y="82" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="1.8">MYMOVIEJAM</text>
  <text x="64" y="168" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">Jack Ryan:</text>
  <text x="64" y="240" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">Ghost War</text>
  <text x="64" y="292" fill="#95a0b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Prime Video review</text>
  <text x="64" y="388" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Slick action. Thin movie.</text>
  <text x="64" y="432" fill="#cfd6e6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">Fun only if you badly missed the series.</text>
  <g filter="url(#shadow)">
    <rect x="64" y="490" width="258" height="112" rx="28" fill="#ffffff" opacity="0.1"/>
    <text x="94" y="535" fill="#ff8b8b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2.2">VERDICT</text>
    <text x="94" y="580" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">SOFT NO</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="366" y="490" width="188" height="112" rx="28" fill="#25D366"/>
    <text x="460" y="533" text-anchor="middle" fill="#083329" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2">RATING</text>
    <text x="460" y="582" text-anchor="middle" fill="#083329" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">5.5/10</text>
  </g>
  <text x="64" y="634" fill="#9fb3cf" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">Audience-first review • honest watch-or-skip verdict</text>
</svg>
